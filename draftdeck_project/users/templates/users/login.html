{% extends "blog/base.html" %}
{% block content %}
<div class="page-wrapper centered">
    <form method="POST" class="form-card">
        {% csrf_token %}
        <h1 class="form-title">Log In</h1>
        
        <div class="form-group">
            <label class="form-label" for="login-username">Username</label>
            <input class="form-input" type="text" id="login-username" name="username" autocomplete="username" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <div class="password-wrapper">
                <input class="form-input" type="password" id="login-password" name="password" autocomplete="current-password" required>
                <button type="button" class="show-pass-btn" data-target="login-password">Show</button>
            </div>
        </div>

        {% if form.errors %}
            <div class="form-error-banner" style="display: flex;">
                <span class="error-icon">⚠️</span>
                <span>Invalid username or password.</span>
            </div>
        {% endif %}

        <button type="submit" class="submit-btn">Log In</button>
        <p class="form-footer">Need An Account? <a href="{% url 'register' %}">Sign Up</a></p>
    </form>
</div>
{% endblock content %}
