{% extends "blog/base.html" %}
{% block content %}
<style>
    .django-form p { margin-bottom: 15px; color: #4a2c11; font-size: 14px; font-weight: bold; }
    .django-form input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid rgba(169, 120, 80, 0.3); margin-top: 5px; font-size: 14px; background: rgba(255,255,255,0.7); }
    .django-form ul { color: #d9534f; font-size: 12px; margin-top: 5px; list-style: none; padding: 0; }
</style>

<div class="page-wrapper">
    <div class="page-card" style="max-width: 500px; margin: 0 auto;">
        <h2 style="font-size: 24px; color: #4a2c11; margin-bottom: 20px;">Change Password</h2>
        <hr class="page-divider" style="margin-bottom: 30px;">
        
        <form method="POST" class="django-form">
            {% csrf_token %}
            {{ form.as_p }}
            
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button class="submit-btn" type="submit" style="padding: 0 20px; height: 35px; width: auto; background: rgba(169, 120, 80, 0.8);">Update Password</button>
                <a href="{% url 'profile' %}" class="submit-btn" style="padding: 0 20px; height: 35px; width: auto; display: inline-flex; align-items: center; text-decoration: none !important; background: rgba(150, 150, 150, 0.4); color: #4a2c11;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
